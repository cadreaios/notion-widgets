<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOSA Studio Actions Panel</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <aside class="studio-panel" aria-label="MOSA Studio Actions">
      <h2 class="studio-panel__title">Studio Actions</h2>

      <nav class="studio-panel__actions" aria-label="Studio action links">
        <a class="studio-action active" data-action="workdesk" href="#" target="_top" aria-label="Work Desk">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 10.5 12 3l9 7.5"></path>
            <path d="M5 9.5V21h14V9.5"></path>
            <path d="M9 21v-6h6v6"></path>
          </svg>
          <span>Work Desk</span>
        </a>

        <a class="studio-action" data-action="marketing" href="#" target="_top" aria-label="Marketing Studio">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m3 11 10-5v12L3 13z"></path>
            <path d="M13 7h4a4 4 0 0 1 0 8h-4"></path>
            <path d="M6 15v4"></path>
          </svg>
          <span>Marketing Studio</span>
        </a>

        <a class="studio-action" data-action="creative" href="#" target="_top" aria-label="Creative Studio">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m12 19 7-7 3 3-7 7-3-3z"></path>
            <path d="m18 13-3-3"></path>
            <path d="M2 22l6-1 9-9-5-5-9 9-1 6z"></path>
          </svg>
          <span>Creative Studio</span>
        </a>

        <a class="studio-action" data-action="social" href="#" target="_top" aria-label="Social Studio">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 11.5a8.5 8.5 0 1 1-3-6.5L21 7.5l-3 2.5L21 12.5z"></path>
          </svg>
          <span>Social Studio</span>
        </a>

        <a class="studio-action" data-action="brand" href="#" target="_top" aria-label="Brand Studio">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M16 3h5v5"></path>
            <path d="m9 14 1.5 1.5L16 10"></path>
            <path d="M4 17a4 4 0 0 1 0-8c1.1 0 2.1.45 2.83 1.17A4 4 0 0 1 14 12a4 4 0 0 1-6.5 3.12A4 4 0 0 1 4 17z"></path>
          </svg>
          <span>Brand Studio</span>
        </a>

        <a class="studio-action" data-action="mobile" href="#" target="_top" aria-label="Open Mobile Desk">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 7h16"></path>
            <path d="M4 12h16"></path>
            <path d="M4 17h16"></path>
          </svg>
          <span>Open Mobile Desk</span>
        </a>
      </nav>
    </aside>

    <script src="./script.js"></script>
  </body>
</html>
